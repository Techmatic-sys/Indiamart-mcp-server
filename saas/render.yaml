# --------------------------------------------------------------------------
# Render.com Blueprint — Infrastructure-as-Code
# https://render.com/docs/blueprint-spec
# --------------------------------------------------------------------------

services:
  # ---- Web Service --------------------------------------------------------
  - type: web
    name: indiamart-lead-manager
    runtime: docker
    dockerfilePath: saas/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: indiamart-db
          property: connectionString
        # Render provides a standard postgres:// URL; we rewrite the scheme
        # at app startup or use the raw value if your config handles it.
      - key: REDIS_URL
        fromService:
          name: indiamart-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://indiamart-lead-manager.onrender.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: GUPSHUP_API_KEY
        sync: false
      - key: GUPSHUP_APP_NAME
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE
        sync: false

  # ---- Redis (for caching / queues) --------------------------------------
  - type: redis
    name: indiamart-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # Only internal access

# ---- Managed PostgreSQL ---------------------------------------------------
databases:
  - name: indiamart-db
    plan: starter
    databaseName: indiamart_saas
    user: indiamart
    ipAllowList: []  # Only internal access
