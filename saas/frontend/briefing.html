<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morning Briefing — LeadFlow CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="/static/shared.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        /* ══════════════════════════════════════════════════════════════════════
           Briefing Page — Premium Redesign
           Glassmorphism · Dark Mode · Animated Counters · Skeleton Loading
           ══════════════════════════════════════════════════════════════════════ */

        /* ── Hero Greeting ────────────────────────────────────────────────── */
        .briefing-hero {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            padding: 40px 36px;
            margin-bottom: 28px;
            background: linear-gradient(135deg, #e94560 0%, #a855f7 50%, #6366f1 100%);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
            color: #fff;
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .briefing-hero::before {
            content: '';
            position: absolute;
            top: -80px; right: -80px;
            width: 260px; height: 260px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            pointer-events: none;
        }
        .briefing-hero::after {
            content: '';
            position: absolute;
            bottom: -60px; left: 20%;
            width: 200px; height: 200px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            pointer-events: none;
        }
        .hero-content { position: relative; z-index: 1; }
        .hero-greeting {
            font-size: 32px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .wave-emoji {
            display: inline-block;
            font-size: 36px;
            animation: wave 2.5s ease-in-out infinite;
            transform-origin: 70% 70%;
        }
        @keyframes wave {
            0%, 60%, 100% { transform: rotate(0deg); }
            10% { transform: rotate(14deg); }
            20% { transform: rotate(-8deg); }
            30% { transform: rotate(14deg); }
            40% { transform: rotate(-4deg); }
            50% { transform: rotate(10deg); }
        }
        .hero-date {
            font-size: 14px;
            opacity: 0.85;
            font-weight: 500;
            margin-bottom: 14px;
        }
        .hero-motivational {
            font-size: 14px;
            font-weight: 600;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* ── KPI Cards ────────────────────────────────────────────────────── */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
            margin-bottom: 28px;
        }
        .kpi-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 22px;
            position: relative;
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            box-shadow: var(--shadow-sm);
        }
        .kpi-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            border-radius: 16px 16px 0 0;
        }
        .kpi-card.accent-blue::before { background: linear-gradient(90deg, #6366f1, #818cf8); }
        .kpi-card.accent-orange::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .kpi-card.accent-green::before { background: linear-gradient(90deg, #10b981, #34d399); }
        .kpi-card.accent-purple::before { background: linear-gradient(90deg, #a855f7, #c084fc); }

        .kpi-icon {
            width: 48px; height: 48px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            margin-bottom: 14px;
        }
        .kpi-icon.blue   { background: rgba(99,102,241,0.12); color: #6366f1; }
        .kpi-icon.orange  { background: rgba(245,158,11,0.12); color: #f59e0b; }
        .kpi-icon.green   { background: rgba(16,185,129,0.12); color: #10b981; }
        .kpi-icon.purple  { background: rgba(168,85,247,0.12); color: #a855f7; }

        .kpi-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1;
            margin-bottom: 4px;
        }
        .kpi-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .kpi-trend {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
            padding: 2px 8px;
            border-radius: 50px;
        }
        .kpi-trend.up   { background: rgba(16,185,129,0.1); color: #10b981; }
        .kpi-trend.down { background: rgba(239,68,68,0.1); color: #ef4444; }

        /* ── Skeleton Loading ─────────────────────────────────────────────── */
        .skel {
            background: linear-gradient(90deg, var(--border-secondary) 25%, var(--bg-hover) 50%, var(--border-secondary) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .skel-value { width: 80px; height: 32px; margin-bottom: 6px; }
        .skel-label { width: 100px; height: 14px; }
        .skel-row { width: 100%; height: 52px; margin-bottom: 10px; border-radius: 10px; }
        .skel-chart { width: 100%; height: 200px; border-radius: 12px; }

        /* ── Section Grid ─────────────────────────────────────────────────── */
        .briefing-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }
        .briefing-grid.full { grid-template-columns: 1fr; }

        /* ── Glass Card ───────────────────────────────────────────────────── */
        .b-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.25s ease;
        }
        .b-card:hover { box-shadow: var(--shadow-md); }
        .b-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }
        .b-card-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .b-card-title i { color: var(--accent); font-size: 15px; }
        .b-card-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 50px;
            background: rgba(233,69,96,0.1);
            color: var(--accent);
        }

        /* ── Priority Leads ───────────────────────────────────────────────── */
        .lead-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 8px;
            background: var(--bg-tertiary);
            border: 1px solid transparent;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .lead-item:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
            transform: translateX(3px);
        }
        .lead-item:last-child { margin-bottom: 0; }
        .lead-avatar {
            width: 40px; height: 40px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 14px;
            color: #fff;
            flex-shrink: 0;
        }
        .lead-avatar.hot  { background: linear-gradient(135deg, #ef4444, #f97316); }
        .lead-avatar.warm { background: linear-gradient(135deg, #f59e0b, #fbbf24); }
        .lead-avatar.cold { background: linear-gradient(135deg, #6366f1, #818cf8); }
        .lead-info { flex: 1; min-width: 0; }
        .lead-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .lead-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .lead-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            flex-shrink: 0;
        }
        .score-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 50px;
        }
        .score-badge.hot  { background: rgba(239,68,68,0.12); color: #ef4444; }
        .score-badge.warm { background: rgba(245,158,11,0.12); color: #f59e0b; }
        .score-badge.cold { background: rgba(99,102,241,0.12); color: #6366f1; }
        .lead-actions {
            display: flex;
            gap: 4px;
        }
        .lead-action-btn {
            width: 28px; height: 28px;
            border: none;
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s ease;
        }
        .lead-action-btn:hover {
            background: var(--accent);
            color: #fff;
        }
        .lead-action-btn.wa:hover {
            background: #25d366;
            color: #fff;
        }

        /* ── Follow-up Timeline ───────────────────────────────────────────── */
        .timeline { position: relative; padding-left: 28px; }
        .timeline::before {
            content: '';
            position: absolute;
            left: 9px; top: 8px; bottom: 8px;
            width: 2px;
            background: var(--border-primary);
            border-radius: 2px;
        }
        .timeline-item {
            position: relative;
            padding: 12px 16px;
            margin-bottom: 6px;
            border-radius: 10px;
            background: var(--bg-tertiary);
            transition: background 0.15s ease;
        }
        .timeline-item:hover { background: var(--bg-hover); }
        .timeline-item:last-child { margin-bottom: 0; }
        .timeline-dot {
            position: absolute;
            left: -23px;
            top: 18px;
            width: 12px; height: 12px;
            border-radius: 50%;
            border: 2px solid var(--bg-secondary);
            box-shadow: 0 0 0 2px var(--border-primary);
        }
        .timeline-dot.overdue  { background: #ef4444; box-shadow: 0 0 0 2px rgba(239,68,68,0.3); }
        .timeline-dot.soon     { background: #f59e0b; box-shadow: 0 0 0 2px rgba(245,158,11,0.3); }
        .timeline-dot.later    { background: #10b981; box-shadow: 0 0 0 2px rgba(16,185,129,0.3); }
        .timeline-dot.done     { background: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.3); }
        .timeline-time {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 2px;
        }
        .timeline-time.overdue { color: #ef4444; }
        .timeline-time.soon    { color: #f59e0b; }
        .timeline-time.later   { color: #10b981; }
        .timeline-message {
            font-size: 13px;
            color: var(--text-primary);
        }
        .timeline-lead {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ── ROI Chart Card ───────────────────────────────────────────────── */
        .roi-chart-wrap {
            position: relative;
            height: 220px;
        }
        .roi-summary {
            display: flex;
            gap: 16px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .roi-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 10px;
            background: var(--bg-tertiary);
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .roi-pill .val {
            font-weight: 800;
            color: var(--text-primary);
        }
        .roi-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── WhatsApp Share ───────────────────────────────────────────────── */
        .wa-share-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
        }
        .wa-share-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px 24px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(37,211,102,0.3);
        }
        .wa-share-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37,211,102,0.4);
        }
        .wa-share-btn:active { transform: translateY(0); }
        .wa-share-btn i { font-size: 18px; }

        .refresh-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .refresh-btn:hover { opacity: 0.88; transform: translateY(-1px); }
        .refresh-btn.loading i { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .wa-preview {
            margin-top: 16px;
            padding: 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-primary);
            border-radius: 12px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 260px;
            overflow-y: auto;
            display: none;
        }

        /* ── Empty / Error states ─────────────────────────────────────────── */
        .empty-state {
            padding: 30px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }
        .empty-state i {
            display: block;
            font-size: 28px;
            margin-bottom: 8px;
            opacity: 0.4;
        }

        /* ── Scroll container for lists ───────────────────────────────────── */
        .scroll-list {
            max-height: 380px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border-primary) transparent;
        }
        .scroll-list::-webkit-scrollbar { width: 4px; }
        .scroll-list::-webkit-scrollbar-track { background: transparent; }
        .scroll-list::-webkit-scrollbar-thumb { background: var(--border-primary); border-radius: 4px; }

        /* ── Responsive ───────────────────────────────────────────────────── */
        @media (max-width: 1200px) {
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 1024px) {
            .briefing-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .kpi-grid { grid-template-columns: 1fr 1fr; }
            .briefing-hero { padding: 28px 22px; }
            .hero-greeting { font-size: 24px; }
            .kpi-value { font-size: 26px; }
            .roi-summary { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div id="sidebarContainer"></div>
    <div class="main">
        <div id="topbarContainer"></div>
        <div class="content">

            <!-- ═══ Hero Greeting ═══ -->
            <div class="briefing-hero" data-animate>
                <div class="hero-content">
                    <div class="hero-greeting">
                        <span id="greetingText">Good morning</span>
                        <span class="wave-emoji">👋</span>
                    </div>
                    <div class="hero-date" id="heroDate"></div>
                    <div class="hero-motivational" id="heroMotivational">
                        <i class="fas fa-bolt" style="margin-right:6px;"></i>
                        <span>Loading your day…</span>
                    </div>
                </div>
            </div>

            <!-- ═══ KPI Summary Cards ═══ -->
            <div class="kpi-grid">
                <div class="kpi-card accent-blue" data-animate>
                    <div class="kpi-icon blue"><i class="fas fa-user-plus"></i></div>
                    <div class="kpi-value" id="kpiNewLeads"><div class="skel skel-value"></div></div>
                    <div class="kpi-label">New Leads Today</div>
                    <div class="kpi-trend up" id="kpiNewLeadsTrend" style="display:none;">
                        <i class="fas fa-arrow-up"></i> <span></span>
                    </div>
                </div>
                <div class="kpi-card accent-orange" data-animate>
                    <div class="kpi-icon orange"><i class="fas fa-clock"></i></div>
                    <div class="kpi-value" id="kpiFollowups"><div class="skel skel-value"></div></div>
                    <div class="kpi-label">Follow-ups Due</div>
                    <div class="kpi-trend down" id="kpiFollowupsTrend" style="display:none;">
                        <i class="fas fa-exclamation"></i> <span></span>
                    </div>
                </div>
                <div class="kpi-card accent-green" data-animate>
                    <div class="kpi-icon green"><i class="fas fa-percentage"></i></div>
                    <div class="kpi-value" id="kpiConversion"><div class="skel skel-value"></div></div>
                    <div class="kpi-label">Conversion Rate</div>
                    <div class="kpi-trend up" id="kpiConversionTrend" style="display:none;">
                        <i class="fas fa-arrow-up"></i> <span></span>
                    </div>
                </div>
                <div class="kpi-card accent-purple" data-animate>
                    <div class="kpi-icon purple"><i class="fas fa-rupee-sign"></i></div>
                    <div class="kpi-value" id="kpiRevenue"><div class="skel skel-value"></div></div>
                    <div class="kpi-label">Revenue Pipeline</div>
                    <div class="kpi-trend up" id="kpiRevenueTrend" style="display:none;">
                        <i class="fas fa-arrow-up"></i> <span></span>
                    </div>
                </div>
            </div>

            <!-- ═══ Priority Leads + Follow-up Timeline ═══ -->
            <div class="briefing-grid">
                <!-- Priority Leads -->
                <div class="b-card" data-animate>
                    <div class="b-card-header">
                        <div class="b-card-title">
                            <i class="fas fa-fire"></i> Priority Leads
                        </div>
                        <span class="b-card-badge" id="leadCount">0</span>
                    </div>
                    <div class="scroll-list" id="priorityLeadsList">
                        <div class="skel skel-row"></div>
                        <div class="skel skel-row"></div>
                        <div class="skel skel-row"></div>
                    </div>
                </div>

                <!-- Scheduled Follow-ups Timeline -->
                <div class="b-card" data-animate>
                    <div class="b-card-header">
                        <div class="b-card-title">
                            <i class="fas fa-calendar-check"></i> Scheduled Follow-ups
                        </div>
                        <span class="b-card-badge" id="followupCount">0</span>
                    </div>
                    <div class="scroll-list" id="followupTimeline">
                        <div class="skel skel-row"></div>
                        <div class="skel skel-row"></div>
                        <div class="skel skel-row"></div>
                    </div>
                </div>
            </div>

            <!-- ═══ ROI Insights Chart ═══ -->
            <div class="b-card" style="margin-bottom:24px;" data-animate>
                <div class="b-card-header">
                    <div class="b-card-title">
                        <i class="fas fa-chart-line"></i> ROI Insights
                    </div>
                    <span style="font-size:12px;color:var(--text-muted);">Monthly Performance</span>
                </div>
                <div class="roi-chart-wrap" id="roiChartWrap">
                    <div class="skel skel-chart"></div>
                </div>
                <div class="roi-summary" id="roiSummary"></div>
            </div>

            <!-- ═══ WhatsApp Share ═══ -->
            <div class="wa-share-card" data-animate>
                <div class="b-card-header">
                    <div class="b-card-title">
                        <i class="fab fa-whatsapp" style="color:#25d366;font-size:18px;"></i> Share Daily Report
                    </div>
                </div>
                <p style="font-size:13px;color:var(--text-muted);margin-bottom:18px;">
                    Copy your morning briefing summary for WhatsApp — paste it in any chat or group.
                </p>
                <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
                    <button class="wa-share-btn" onclick="copyWhatsApp()">
                        <i class="fab fa-whatsapp"></i> Copy WhatsApp Report
                    </button>
                    <button class="refresh-btn" id="refreshBtn" onclick="loadBriefing()">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
                <pre class="wa-preview" id="waPreview"></pre>
            </div>

        </div><!-- /content -->
    </div><!-- /main -->

    <!-- Notification Panel -->
    <div id="notifPanelContainer"></div>

    <script src="/static/shared.js"></script>
    <script>
    /* ══════════════════════════════════════════════════════════════════════════
       Briefing Page — Controller
       ══════════════════════════════════════════════════════════════════════════ */

    let waText = '';
    let roiChart = null;

    // ── Init ─────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
        if (!authGuard()) return;
        document.getElementById('sidebarContainer').innerHTML = generateSidebar('briefing');
        document.getElementById('topbarContainer').innerHTML = generateTopbar('Morning Briefing',
            `<button class="refresh-btn" id="topRefreshBtn" onclick="loadBriefing()" style="margin-right:8px;padding:10px 16px;">
                <i class="fas fa-sync-alt"></i> Refresh
             </button>`
        );
        document.getElementById('notifPanelContainer').innerHTML = generateNotifPanel();
        initLeadFlow();

        setGreeting();
        setHeroDate();
        loadBriefing();
    });

    // ── Time-based Greeting ──────────────────────────────────────────────────
    function setGreeting() {
        const hour = new Date().getHours();
        let greeting = 'Good evening';
        if (hour >= 5 && hour < 12) greeting = 'Good morning';
        else if (hour >= 12 && hour < 17) greeting = 'Good afternoon';

        try {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (user.name) greeting += `, ${user.name.split(' ')[0]}`;
        } catch(e) {}

        document.getElementById('greetingText').textContent = greeting;
    }

    function setHeroDate() {
        const now = new Date();
        document.getElementById('heroDate').textContent = now.toLocaleDateString('en-IN', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });
    }

    // ── Animated Counter ─────────────────────────────────────────────────────
    function animateValue(el, target, duration = 1200, prefix = '', suffix = '') {
        const start = performance.now();
        function tick(now) {
            const p = Math.min((now - start) / duration, 1);
            const ease = 1 - Math.pow(1 - p, 3); // easeOutCubic
            const val = Math.round(target * ease);
            el.textContent = prefix + val.toLocaleString('en-IN') + suffix;
            if (p < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
    }

    // ── Load Briefing Data ───────────────────────────────────────────────────
    async function loadBriefing() {
        const btn = document.getElementById('refreshBtn');
        if (btn) btn.classList.add('loading');

        try {
            const [res, waRes] = await Promise.all([
                apiCall('GET', '/api/briefing/today'),
                apiCall('GET', '/api/briefing/whatsapp-format'),
            ]);

            if (!res || !waRes) return;

            const data = await res.json();
            const waData = await waRes.json();
            waText = waData.text || '';

            renderKPIs(data);
            renderMotivational(data);
            renderPriorityLeads(data.hot_leads || []);
            renderFollowupTimeline(data.today_reminders || [], data.overdue_followups || []);
            renderROIChart(data);
            renderWhatsAppPreview(waText);
        } catch(e) {
            showToast('Failed to load briefing', 'error');
            console.error(e);
        } finally {
            if (btn) btn.classList.remove('loading');
        }
    }

    // ── KPI Cards ────────────────────────────────────────────────────────────
    function renderKPIs(data) {
        const newLeads = data.new_leads_count || 0;
        const hotLeads = (data.hot_leads || []).length;
        const overdue = (data.overdue_followups || []).length;
        const reminders = (data.today_reminders || []).length;
        const followups = overdue + reminders;
        const pipeline = data.pipeline_summary || {};
        const totalVal = pipeline.total_value || 0;
        const byStage = pipeline.by_stage || {};
        const totalLeads = Object.values(byStage).reduce((a, b) => a + b, 0) || 1;
        const wonLeads = byStage.won || 0;
        const convRate = Math.round((wonLeads / totalLeads) * 100);

        // New Leads
        const elNew = document.getElementById('kpiNewLeads');
        elNew.innerHTML = '';
        animateValue(elNew, newLeads, 1200);

        // Follow-ups Due
        const elFollowups = document.getElementById('kpiFollowups');
        elFollowups.innerHTML = '';
        animateValue(elFollowups, followups, 1200);
        if (overdue > 0) {
            const trend = document.getElementById('kpiFollowupsTrend');
            trend.style.display = 'inline-flex';
            trend.querySelector('span').textContent = `${overdue} overdue`;
        }

        // Conversion Rate
        const elConv = document.getElementById('kpiConversion');
        elConv.innerHTML = '';
        animateValue(elConv, convRate, 1200, '', '%');

        // Revenue Pipeline
        const elRev = document.getElementById('kpiRevenue');
        elRev.innerHTML = '';
        elRev.textContent = formatLakhs(totalVal);
    }

    function formatLakhs(val) {
        if (!val) return '₹0';
        if (val >= 10000000) return '₹' + (val / 10000000).toFixed(1) + 'Cr';
        if (val >= 100000) return '₹' + (val / 100000).toFixed(1) + 'L';
        if (val >= 1000) return '₹' + (val / 1000).toFixed(0) + 'K';
        return '₹' + Math.round(val).toLocaleString('en-IN');
    }

    // ── Motivational ─────────────────────────────────────────────────────────
    function renderMotivational(data) {
        const el = document.getElementById('heroMotivational');
        const stat = data.motivational_stat || 'Ready to close some deals today!';
        el.innerHTML = `<i class="fas fa-bolt" style="margin-right:6px;"></i><span>${escapeHtml(stat)}</span>`;
    }

    // ── Priority Leads List ──────────────────────────────────────────────────
    function renderPriorityLeads(leads) {
        const el = document.getElementById('priorityLeadsList');
        document.getElementById('leadCount').textContent = leads.length;

        if (!leads.length) {
            el.innerHTML = '<div class="empty-state"><i class="fas fa-smile-beam"></i> No hot leads pending — nice work!</div>';
            return;
        }

        el.innerHTML = leads.slice(0, 10).map(l => {
            const score = l.score || 0;
            const tier = score >= 70 ? 'hot' : score >= 40 ? 'warm' : 'cold';
            const label = score >= 70 ? '🔥 Hot' : score >= 40 ? '🌤 Warm' : '❄️ Cold';
            const initial = (l.name || '?').charAt(0).toUpperCase();
            const meta = [l.product || l.company, l.stage].filter(Boolean).join(' · ');
            const dealStr = l.deal_value ? formatLakhs(l.deal_value) : '';

            return `
            <div class="lead-item" onclick="window.location='/app/leads'">
                <div class="lead-avatar ${tier}">${initial}</div>
                <div class="lead-info">
                    <div class="lead-name">${escapeHtml(l.name)}${dealStr ? ` <span style="font-weight:400;color:var(--text-muted);font-size:11px;">· ${dealStr}</span>` : ''}</div>
                    <div class="lead-meta">${escapeHtml(meta)}</div>
                </div>
                <div class="lead-right">
                    <span class="score-badge ${tier}">${label} ${score}</span>
                    <div class="lead-actions" onclick="event.stopPropagation();">
                        <button class="lead-action-btn" title="Call" onclick="showToast('Calling ${escapeHtml(l.name)}…','info')"><i class="fas fa-phone"></i></button>
                        <button class="lead-action-btn wa" title="WhatsApp" onclick="showToast('Opening WhatsApp…','info')"><i class="fab fa-whatsapp"></i></button>
                        <button class="lead-action-btn" title="View" onclick="window.location='/app/leads'"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    // ── Follow-up Timeline ───────────────────────────────────────────────────
    function renderFollowupTimeline(reminders, overdue) {
        const el = document.getElementById('followupTimeline');
        const total = overdue.length + reminders.length;
        document.getElementById('followupCount').textContent = total;

        if (!total) {
            el.innerHTML = '<div class="empty-state"><i class="fas fa-calendar-check"></i> No follow-ups scheduled today</div>';
            return;
        }

        // Combine overdue + reminders, sorted by time
        const items = [];

        overdue.forEach(o => {
            items.push({
                time: o.remind_at || o.follow_up_date || '',
                message: o.message || o.notes || `Follow up with ${o.lead_name || 'lead'}`,
                lead: o.lead_name || '',
                type: 'overdue'
            });
        });

        reminders.forEach(r => {
            const t = new Date(r.remind_at);
            const now = new Date();
            const diffH = (t - now) / 3600000;
            const type = diffH < 0 ? 'overdue' : diffH < 2 ? 'soon' : 'later';
            items.push({
                time: r.remind_at,
                message: r.message || 'Follow-up reminder',
                lead: r.lead_name || '',
                type: type
            });
        });

        items.sort((a, b) => new Date(a.time) - new Date(b.time));

        el.innerHTML = `<div class="timeline">${items.slice(0, 12).map(item => {
            const t = new Date(item.time);
            const timeStr = isNaN(t) ? 'Pending' : t.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
            const timeLabel = item.type === 'overdue' ? 'Overdue' : timeStr;

            return `
            <div class="timeline-item">
                <div class="timeline-dot ${item.type}"></div>
                <div class="timeline-time ${item.type}">${timeLabel}</div>
                <div class="timeline-message">${escapeHtml(item.message)}</div>
                ${item.lead ? `<div class="timeline-lead"><i class="fas fa-user" style="margin-right:4px;"></i>${escapeHtml(item.lead)}</div>` : ''}
            </div>`;
        }).join('')}</div>`;
    }

    // ── ROI Insights Chart ───────────────────────────────────────────────────
    async function renderROIChart(briefingData) {
        const wrap = document.getElementById('roiChartWrap');
        const summaryEl = document.getElementById('roiSummary');

        try {
            const res = await apiCall('GET', '/api/analytics/roi');
            if (!res) throw new Error('No response');
            const d = await res.json();

            // Build chart
            wrap.innerHTML = '<canvas id="roiCanvas"></canvas>';
            const ctx = document.getElementById('roiCanvas').getContext('2d');

            // Detect dark mode
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
            const textColor = isDark ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.4)';

            // Simulated monthly data from ROI values
            const wonVal = d.won_value || 0;
            const subCost = d.subscription_cost || 15000;
            const months = ['Jan','Feb','Mar','Apr','May','Jun'];
            const revenueData = months.map((_, i) => Math.round(wonVal * (0.4 + (i * 0.12)) / 6));
            const costData = months.map(() => subCost);

            if (roiChart) roiChart.destroy();

            roiChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [
                        {
                            label: 'Revenue',
                            data: revenueData,
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16,185,129,0.08)',
                            borderWidth: 2.5,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 4,
                            pointBackgroundColor: '#10b981',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                        },
                        {
                            label: 'Subscription Cost',
                            data: costData,
                            borderColor: '#ef4444',
                            backgroundColor: 'rgba(239,68,68,0.05)',
                            borderWidth: 2,
                            borderDash: [6, 4],
                            fill: false,
                            tension: 0,
                            pointRadius: 3,
                            pointBackgroundColor: '#ef4444',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: isDark ? '#1f2937' : '#fff',
                            titleColor: isDark ? '#f3f4f6' : '#111827',
                            bodyColor: isDark ? '#d1d5db' : '#4b5563',
                            borderColor: isDark ? '#374151' : '#e5e7eb',
                            borderWidth: 1,
                            cornerRadius: 10,
                            padding: 12,
                            callbacks: {
                                label: ctx => `${ctx.dataset.label}: ₹${ctx.parsed.y.toLocaleString('en-IN')}`
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { color: textColor, font: { size: 11, weight: '500' } }
                        },
                        y: {
                            grid: { color: gridColor },
                            ticks: {
                                color: textColor,
                                font: { size: 11 },
                                callback: v => '₹' + (v >= 100000 ? (v / 100000).toFixed(0) + 'L' : (v / 1000).toFixed(0) + 'K')
                            }
                        }
                    }
                }
            });

            // ROI Summary pills
            summaryEl.innerHTML = `
                <div class="roi-pill">
                    <div class="roi-dot" style="background:#f59e0b;"></div>
                    ROI Multiple: <span class="val" style="color:#f59e0b;">${d.roi_multiple || 0}x</span>
                </div>
                <div class="roi-pill">
                    <div class="roi-dot" style="background:#10b981;"></div>
                    Won Deals: <span class="val" style="color:#10b981;">${d.won_deals || 0}</span>
                </div>
                <div class="roi-pill">
                    <div class="roi-dot" style="background:#6366f1;"></div>
                    Cost/Lead: <span class="val" style="color:#6366f1;">₹${Math.round(d.cost_per_lead || 0).toLocaleString('en-IN')}</span>
                </div>
                <div class="roi-pill">
                    <div class="roi-dot" style="background:#a855f7;"></div>
                    Avg Deal: <span class="val" style="color:#a855f7;">${formatLakhs(d.avg_deal_size || 0)}</span>
                </div>
            `;
        } catch(e) {
            wrap.innerHTML = '<div class="empty-state"><i class="fas fa-chart-line"></i> ROI data unavailable</div>';
            summaryEl.innerHTML = '';
        }
    }

    // ── WhatsApp ─────────────────────────────────────────────────────────────
    function renderWhatsAppPreview(text) {
        const el = document.getElementById('waPreview');
        el.textContent = text;
        el.style.display = text ? 'block' : 'none';
    }

    async function copyWhatsApp() {
        if (!waText) {
            showToast('Briefing not loaded yet', 'error');
            return;
        }
        try {
            await navigator.clipboard.writeText(waText);
            showToast('✅ Report copied to clipboard!', 'success');
        } catch(e) {
            const ta = document.createElement('textarea');
            ta.value = waText;
            ta.style.cssText = 'position:fixed;opacity:0;';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            ta.remove();
            showToast('✅ Report copied!', 'success');
        }
    }
    </script>
