# --------------------------------------------------------------------------
# IndiaMART Lead Manager — Full Stack Docker Compose
# --------------------------------------------------------------------------
# Usage:
#   docker compose up -d              # Start SaaS web app + dependencies
#   docker compose run mcp            # Run MCP server interactively (stdio)
#   docker compose --profile mcp up   # Start everything including MCP
# --------------------------------------------------------------------------
services:
  # ---- MCP Server (stdio transport) ------------------------------------
  mcp:
    build:
      context: .
      dockerfile: mcp_tools/Dockerfile
    container_name: indiamart-mcp
    env_file:
      - .env
    volumes:
      - mcp_data:/app/data
    stdin_open: true
    tty: true
    profiles:
      - mcp
    restart: "no"

  # ---- SaaS Web Application -------------------------------------------
  app:
    build:
      context: .
      dockerfile: saas/Dockerfile
    container_name: indiamart-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/indiamart_saas
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---- PostgreSQL -------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: indiamart-postgres
    environment:
      POSTGRES_DB: indiamart_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d indiamart_saas"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Redis ------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: indiamart-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mcp_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
